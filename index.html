<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CryptoZoo Idle</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="top-bar glass">
      <div>
        <h1>CryptoZoo</h1>
        <p id="player-level">Level 1</p>
      </div>
      <div class="currency-panel">
        <div><span>🪙</span><strong id="coins">0</strong></div>
        <div><span>💎</span><strong id="tokens">0</strong></div>
      </div>
    </header>

    <main id="screen-container" class="screen-container"></main>

    <nav class="bottom-tabs glass" id="tab-nav"></nav>
  </div>

  <template id="animal-card-template">
    <article class="animal-card">
      <div class="emoji"></div>
      <div class="content">
        <h3 class="name"></h3>
        <p class="meta"></p>
        <p class="income"></p>
      </div>
      <button class="btn-secondary action">Manage</button>
    </article>
  </template>

  <script type="module" src="main.js"></script>
</body>
</html>
